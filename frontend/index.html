<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormationAI — Formations avec formateur IA</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="nav-catalogue">🎓 FormationAI</div>
    <nav>
      <button class="nav-link" id="nav-catalogue-link" onclick="document.getElementById('nav-catalogue').click()">Catalogue</button>
      <button class="nav-link hidden" id="nav-admin">Administration</button>
      <span class="nav-user" id="nav-user"></span>
      <button class="btn btn-small hidden" id="btn-logout">Déconnexion</button>
    </nav>
  </header>

  <main>
    <!-- Vue authentification -->
    <section id="view-auth" class="view">
      <div class="auth-box">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Connexion</button>
          <button class="auth-tab" data-tab="register">Inscription</button>
        </div>

        <form id="form-login">
          <label>Email <input type="email" id="login-email" required value="admin@formationai.dev" /></label>
          <label>Mot de passe <input type="password" id="login-password" required value="Admin@123" /></label>
          <button class="btn btn-primary" type="submit">Se connecter</button>
        </form>

        <form id="form-register" class="hidden">
          <label>Prénom <input type="text" id="reg-prenom" required /></label>
          <label>Nom <input type="text" id="reg-nom" required /></label>
          <label>Email <input type="email" id="reg-email" required /></label>
          <label>Mot de passe <input type="password" id="reg-password" required minlength="6" /></label>
          <label>Rôle
            <select id="reg-role">
              <option value="0">Apprenant</option>
              <option value="1">Formateur</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">Créer mon compte</button>
        </form>
      </div>
    </section>

    <!-- Vue catalogue -->
    <section id="view-catalogue" class="view hidden">
      <h1>Catalogue des formations</h1>
      <div id="catalogue-grid" class="grid"></div>
    </section>

    <!-- Vue détail -->
    <section id="view-detail" class="view hidden">
      <div id="detail-content"></div>
    </section>

    <!-- Vue admin -->
    <section id="view-admin" class="view hidden">
      <h1>Tableau de bord</h1>
      <div id="admin-content" class="stats-grid"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/formateur-ia.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
